# Netlify Configuration
# Automatically reads from this file during deployment

[build]
  command = "echo 'Bibliotheca is a static site with serverless functions'"
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

# Redirect rules for client-side routing
[[redirects]]
  from = "/pages/*"
  to = "/pages/:splat"
  status = 200

# Cache static assets effectively
[[headers]]
  for = "/*.{js,css,ico,woff,woff2}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML files (so users always get latest version)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
