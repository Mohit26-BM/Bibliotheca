<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <title>Bibliotheca — Feedback</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/feedback.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="app-page">
  <nav>
    <div class="nav-brand"><img src="../favicon.ico" alt="Bibliotheca logo" class="nav-logo-icon" /> <span>Bibliotheca</span></div>
    <div class="nav-links">
      <a href="dashboard.html">Browse</a>
      <a href="profile.html">My Profile</a>
      <a href="feedback.html" style="color:var(--gold)">Feedback</a>
      <button class="nav-btn" onclick="signOut()">Sign Out</button>
      <span class="nav-user" id="navUser"></span>
    </div>
  </nav>

  <div class="page-wrap fade-in" style="max-width:840px">
    <div class="feedback-head reveal">
      <h2>Send Feedback</h2>
      <p>Your suggestions help us improve the library experience.</p>
    </div>

    <div class="feedback-card reveal">
      <form id="feedbackForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="fbName">Name</label>
            <input id="fbName" name="name" type="text" placeholder="Your full name" required />
          </div>
          <div class="form-group">
            <label for="fbEmail">Email</label>
            <input id="fbEmail" name="email" type="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="fbType">Feedback Type</label>
          <select id="fbType" name="feedback_type" title="Feedback type" required>
            <option value="">Select one</option>
            <option value="bug">Bug Report</option>
            <option value="feature">Feature Request</option>
            <option value="ux">User Experience</option>
            <option value="general">General Feedback</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fbMessage">Message</label>
          <textarea id="fbMessage" name="message" rows="7" placeholder="Share what is working well and what we can improve..." required></textarea>
        </div>

        <input type="hidden" name="botcheck" value="" class="hp-field" />

        <div id="feedbackMsg" class="feedback-msg" aria-live="polite"></div>

        <button class="btn btn-gold" id="sendFeedbackBtn" type="submit">Send Feedback</button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script src="../js/effects.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/feedback.js"></script>
</body>
</html>
